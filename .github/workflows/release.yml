name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION=$(grep '^version:' apps/softphone_app/pubspec.yaml | awk '{print $2}')
          APP_VERSION_SAFE=${APP_VERSION//+/-}

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${APP_VERSION_SAFE}-manual-${GITHUB_RUN_NUMBER}"
          fi

          RELEASE_NAME="PacketDial ${APP_VERSION}"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

  build_windows:
    runs-on: windows-latest
    needs: prepare
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        shell: pwsh
        run: flutter pub get

      - name: Validate vendored native artifacts
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File native/voip_core/sync_artifacts.ps1

      - name: Build Windows release
        shell: pwsh
        run: |
          Set-Location apps/softphone_app
          flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $versionSafe = $env:APP_VERSION.Replace('+', '-')
          $artifactName = "PacketDial-windows-x64-$versionSafe-$($env:RELEASE_TAG).zip"
          $buildOutput = "apps/softphone_app/build/windows/x64/runner/Release"
          Compress-Archive -Path "$buildOutput/*" -DestinationPath $artifactName -Force
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.ARTIFACT_NAME }}

  build_android:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify Android vendored native binary
        run: test -f apps/softphone_app/android/app/src/main/jniLibs/arm64-v8a/libvoip_core.so

      - name: Build Android release APK
        run: |
          cd apps/softphone_app
          flutter build apk --release

      - name: Package Android artifact
        shell: bash
        run: |
          set -euo pipefail
          version_safe="${APP_VERSION//+/-}"
          artifact_name="PacketDial-android-arm64-v8a-${version_safe}-${RELEASE_TAG}.apk"
          cp apps/softphone_app/build/app/outputs/flutter-apk/app-release.apk "$artifact_name"
          echo "ARTIFACT_NAME=$artifact_name" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ${{ env.ARTIFACT_NAME }}

  publish_release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_windows
      - build_android
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          files: |
            release-assets/windows-release/*
            release-assets/android-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

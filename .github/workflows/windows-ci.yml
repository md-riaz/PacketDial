name: windows-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Enable git long paths
        run: git config --system core.longpaths true

      - name: Show repo structure (baseline)
        shell: cmd
        run: |
          echo ===== REPO ROOT =====
          tree /A /F

      - name: Map workspace to short path
        shell: pwsh
        run: |
          subst X: "$env:GITHUB_WORKSPACE"
          Write-Host "Mapped workspace to X:"

      - name: Show short path structure
        shell: cmd
        run: |
          X:
          echo ===== SHORT PATH ROOT =====
          tree /A /F

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # -----------------------------------------------------------------------
      # PJSIP: build from submodule source (cached by submodule commit SHA)
      # -----------------------------------------------------------------------
      - name: Cache PJSIP build output
        id: cache-pjsip
        uses: actions/cache@v4
        with:
          path: engine_pjsip/build/out
          key: pjsip-windows-v2142-${{ hashFiles('engine_pjsip/pjproject_config_site.h', 'scripts/build_pjsip.ps1') }}

      - name: Build pjproject (Release x64)
        if: steps.cache-pjsip.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          X:
          .\scripts\build_pjsip.ps1

      - name: Show PJSIP build output
        if: always()
        shell: cmd
        run: |
          X:
          echo ===== PJSIP BUILD OUTPUT =====
          if exist engine_pjsip\build\out (
              tree /A /F engine_pjsip\build\out
          ) else (
              echo PJSIP build output not found
          )
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Rust core
      # -----------------------------------------------------------------------
      - name: Cargo test (Rust core)
        shell: pwsh
        run: |
          X:
          cd core_rust
          cargo test

      - name: Build Rust core (cdylib → voip_core.dll)
        shell: pwsh
        env:
          PJSIP_LIB_DIR: ${{ github.workspace }}\engine_pjsip\build\out\lib
          PJSIP_INCLUDE_DIR: ${{ github.workspace }}\engine_pjsip\build\out\include
        run: |
          X:
          cd core_rust
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify DLL exists
        shell: cmd
        run: |
          X:
          dir core_rust\target\x86_64-pc-windows-msvc\release

      - name: Show Rust target structure
        shell: cmd
        run: |
          X:
          echo ===== RUST TARGET RELEASE =====
          tree /A /F core_rust\target\x86_64-pc-windows-msvc\release
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Flutter
      # -----------------------------------------------------------------------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        shell: pwsh
        run: |
          X:
          cd app_flutter
          flutter config --enable-windows-desktop

      - name: Flutter pub get
        shell: pwsh
        run: |
          X:
          cd app_flutter
          flutter pub get

      - name: Show Flutter project structure
        shell: cmd
        run: |
          X:
          echo ===== FLUTTER PROJECT =====
          tree /A /F app_flutter
        continue-on-error: true

      - name: Show Windows build folder before build
        shell: cmd
        run: |
          X:
          echo ===== BUILD WINDOWS FOLDER (PRE) =====
          if exist app_flutter\build\windows (
              tree /A /F app_flutter\build\windows
          ) else (
              echo No windows build folder yet.
          )
        continue-on-error: true

      - name: Flutter build Windows (release)
        shell: pwsh
        run: |
          X:
          cd app_flutter
          flutter clean
          flutter build windows --release --verbose 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "flutter build windows --release failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Inspect flutter_assets and runner folders
        if: always()
        shell: cmd
        run: |
          X:
          echo ===== WINDOWS BUILD STRUCTURE (POST) =====
          if exist app_flutter\build\windows\x64 (
              tree /A /F app_flutter\build\windows\x64
          ) else (
              echo x64 folder missing.
          )
          echo.
          echo ===== FLUTTER ASSETS CHECK =====
          if exist app_flutter\build\windows\x64\flutter_assets (
              tree /A /F app_flutter\build\windows\x64\flutter_assets
          ) else (
              echo flutter_assets folder MISSING
          )
        continue-on-error: true

      - name: Debug - List build output directory structure
        if: always()
        shell: pwsh
        run: |
          X:
          Write-Host "=== Contents of app_flutter/build/windows/x64/runner/Release ==="
          if (Test-Path app_flutter/build/windows/x64/runner/Release) {
            Get-ChildItem -Recurse app_flutter/build/windows/x64/runner/Release | ForEach-Object {
              $indent = "  " * ($_.FullName.Split([IO.Path]::DirectorySeparatorChar).Count - $PWD.Path.Split([IO.Path]::DirectorySeparatorChar).Count - 5)
              if ($_.PSIsContainer) {
                Write-Host "${indent}📁 $($_.Name)/"
              } else {
                Write-Host "${indent}📄 $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
              }
            }
          } else {
            Write-Host "Release folder does not exist"
          }

      - name: Copy voip_core.dll into Flutter output
        shell: pwsh
        run: |
          X:
          $dll  = "core_rust\target\x86_64-pc-windows-msvc\release\voip_core.dll"
          $dest = "app_flutter\build\windows\x64\runner\Release"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination $dest
            Write-Host "Copied $dll -> $dest"
          } else {
            Write-Warning "voip_core.dll not found – PJSIP integration pending."
          }

      - name: Show final Release directory tree before packaging
        if: always()
        shell: cmd
        run: |
          X:
          echo ===== FINAL RELEASE DIRECTORY STRUCTURE =====
          if exist app_flutter\build\windows\x64\runner\Release (
              tree /A /F app_flutter\build\windows\x64\runner\Release
          ) else (
              echo Release folder does not exist
          )
        continue-on-error: true

      - name: Package release artifact
        shell: pwsh
        run: |
          X:
          .\scripts\package.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketDial-windows-x64
          path: dist/PacketDial-windows-x64.zip
          if-no-files-found: warn


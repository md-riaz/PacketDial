name: windows-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo test (Rust core)
        working-directory: core_rust
        run: cargo test

      - name: Build Rust core (cdylib → voip_core.dll)
        working-directory: core_rust
        run: cargo build --release

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        working-directory: app_flutter
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        working-directory: app_flutter
        run: flutter pub get

      - name: Ensure Windows platform files exist
        working-directory: app_flutter
        run: flutter create --platforms=windows .

      - name: Flutter build Windows (release)
        working-directory: app_flutter
        run: flutter build windows --release

      - name: Copy voip_core.dll into Flutter output
        shell: pwsh
        run: |
          $dll  = "core_rust\target\release\voip_core.dll"
          $dest = "app_flutter\build\windows\x64\runner\Release"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination $dest
            Write-Host "Copied $dll -> $dest"
          } else {
            Write-Warning "voip_core.dll not found – PJSIP integration pending."
          }

      - name: Verify build output contains Flutter runtime
        shell: pwsh
        run: |
          $release = "app_flutter\build\windows\x64\runner\Release"
          Write-Host "Contents of $release :"
          Get-ChildItem $release -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)  ($([math]::Round($_.Length / 1KB, 1)) KB)"
          }
          $required = @('flutter_windows.dll', 'icudtl.dat')
          foreach ($f in $required) {
            if (-not (Test-Path (Join-Path $release $f))) {
              Write-Error "FATAL: $f is missing from the build output."
              exit 1
            }
          }
          if (-not (Test-Path (Join-Path $release 'data'))) {
            Write-Error "FATAL: data/ directory is missing from the build output."
            exit 1
          }
          Write-Host "All required Flutter runtime files are present."

      - name: Package release artifact
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketDial-windows-x64
          path: dist/PacketDial-windows-x64.zip
          if-no-files-found: warn

name: 'Build Windows app'
description: 'Build PJSIP, Rust core and Flutter Windows application'

runs:
  using: "composite"
  steps:
    - name: Enable git long paths
      shell: bash
      run: git config --system core.longpaths true

    - name: Map workspace to short path
      shell: pwsh
      run: |
        # Check if X: is already mapped, if not map it
        if (-not (Test-Path X:)) {
          subst X: "$env:GITHUB_WORKSPACE"
        }
        Write-Host "Mapped workspace to X:"

    - name: Set VCPKG_ROOT environment variable
      shell: pwsh
      run: |
        echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Setup vcpkg (fresh clone)
      shell: pwsh
      run: |
        X:
        # Save existing installed packages if any
        $hasInstalled = Test-Path ".\vcpkg\installed"
        if ($hasInstalled) {
          Move-Item -Path ".\vcpkg\installed" -Destination ".\vcpkg_installed_backup" -Force
        }
        # Remove old vcpkg and clone fresh
        Remove-Item -Recurse -Force ".\vcpkg" -ErrorAction SilentlyContinue
        git clone --depth 1 https://github.com/microsoft/vcpkg
        # Restore installed packages
        if ($hasInstalled) {
          Move-Item -Path ".\vcpkg_installed_backup" -Destination ".\vcpkg\installed" -Force
        }
        Write-Host "vcpkg cloned successfully"
        # Bootstrap vcpkg to create vcpkg.exe
        Write-Host "Bootstrapping vcpkg..."
        Set-Location vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics
        .\bootstrap-vcpkg.bat -disableMetrics
        # Restore custom triplets
        Write-Host "Restoring custom triplets..."
        Copy-Item -Path "$env:GITHUB_WORKSPACE\vcpkg_triplets\*.cmake" -Destination "$env:GITHUB_WORKSPACE\vcpkg\triplets\" -Force
        # Integrate vcpkg with MSBuild
        Write-Host "Integrating vcpkg with MSBuild..."
        .\vcpkg.exe integrate install
        # Verify triplet exists
        if (-not (Test-Path "$env:GITHUB_WORKSPACE\vcpkg\triplets\x64-windows-static-md.cmake")) {
          Write-Error "x64-windows-static-md triplet not found"
          exit 1
        }
        Write-Host "vcpkg ready with x64-windows-static-md triplet"
      env:
        GIT_TERMINAL_PROMPT: 0

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: vcpkg/installed
        key: vcpkg-x64-windows-static-md-${{ hashFiles('.github/actions/build-windows/action.yml') }}
        restore-keys: |
          vcpkg-x64-windows-static-md-

    - name: Install vcpkg dependencies (openssl, opus)
      shell: pwsh
      env:
        VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      run: |
        X:
        cd vcpkg
        Write-Host "Installing OpenSSL and Opus for x64-windows-static-md..."
        .\vcpkg.exe install openssl:x64-windows-static-md opus:x64-windows-static-md --recurse
        Write-Host "Verifying installation..."
        if (Test-Path "$env:VCPKG_ROOT\installed\x64-windows-static-md\include\openssl\ssl.h") {
          Write-Host "OpenSSL installed successfully"
        } else {
          Write-Error "OpenSSL installation verification failed at $env:VCPKG_ROOT\installed\x64-windows-static-md\include\openssl\ssl.h"
          exit 1
        }

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          core_rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache PJSIP build output
      id: cache-pjsip
      uses: actions/cache@v4
      with:
        path: engine_pjsip/build/out
        key: pjsip-windows-v2144-${{ hashFiles('engine_pjsip/pjproject_config_site.h', 'scripts/build_pjsip.ps1', 'engine_pjsip/pjproject/pjsip-apps/build/Samples-vc.mak') }}

    - name: Clean stale PJSIP build artifacts
      shell: pwsh
      run: |
        X:
        # Remove stale build directories that might cause issues
        $stalePaths = @(
          "engine_pjsip\pjproject\pjlib\build\output",
          "engine_pjsip\pjproject\pjsip\build\output",
          "engine_pjsip\pjproject\pjmedia\build\output",
          "engine_pjsip\pjproject\pjnath\build\output",
          "engine_pjsip\pjproject\pjlib-util\build\output"
        )
        foreach ($path in $stalePaths) {
          if (Test-Path $path) {
            Remove-Item -Recurse -Force $path
            Write-Host "Cleaned $path"
          }
        }

    - name: Build pjproject (Release x64)
      if: steps.cache-pjsip.outputs.cache-hit != 'true'
      shell: pwsh
      env:
        VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      run: |
        X:
        .\scripts\build_pjsip.ps1

    - name: Cargo test (Rust core)
      shell: pwsh
      run: |
        X:
        cd core_rust
        cargo test

    - name: Build Rust core (cdylib → voip_core.dll)
      shell: pwsh
      env:
        PJSIP_LIB_DIR: ${{ github.workspace }}\engine_pjsip\build\out\lib
        PJSIP_INCLUDE_DIR: ${{ github.workspace }}\engine_pjsip\build\out\include
      run: |
        X:
        cd core_rust
        cargo build --release --target x86_64-pc-windows-msvc

    - name: Build CLI (pd.exe)
      shell: pwsh
      run: |
        X:
        cd tools\pd
        cargo build --release --target x86_64-pc-windows-msvc

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: stable
        cache: true

    - name: Enable Flutter Windows desktop
      shell: pwsh
      run: |
        X:
        cd app_flutter
        flutter config --enable-windows-desktop

    - name: Flutter pub get
      shell: pwsh
      run: |
        X:
        cd app_flutter
        flutter pub get

    - name: Flutter analyze
      shell: pwsh
      run: |
        X:
        cd app_flutter
        flutter analyze
      continue-on-error: true

    - name: Flutter test
      shell: pwsh
      run: |
        X:
        cd app_flutter
        flutter test
      continue-on-error: true

    - name: Flutter build Windows (release)
      shell: pwsh
      run: |
        X:
        cd app_flutter
        flutter clean
        flutter build windows --release --verbose 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "flutter build windows --release failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Copy voip_core.dll into Flutter output
      shell: pwsh
      run: |
        X:
        $dll  = "core_rust\target\x86_64-pc-windows-msvc\release\voip_core.dll"
        $dest = "app_flutter\build\windows\x64\runner\Release"
        if (Test-Path $dll) {
          Copy-Item $dll -Destination $dest
          Write-Host "Copied $dll -> $dest"
        } else {
          Write-Warning "voip_core.dll not found – PJSIP integration pending."
        }

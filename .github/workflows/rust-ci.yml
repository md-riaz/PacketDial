name: rust-ci

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust tests & lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: core_rust

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core_rust/Cargo.lock') }}

      - name: cargo test (core_rust)
        working-directory: core_rust
        run: cargo test

      - name: cargo fmt (core_rust)
        working-directory: core_rust
        run: cargo fmt --check

      - name: cargo clippy (core_rust)
        working-directory: core_rust
        run: cargo clippy -- -D warnings

      - name: cargo test (pd)
        working-directory: tools/pd
        run: cargo test

      - name: cargo fmt (pd)
        working-directory: tools/pd
        run: cargo fmt --check || true # ignore if not setup

      - name: cargo clippy (pd)
        working-directory: tools/pd
        run: cargo clippy -- -D warnings

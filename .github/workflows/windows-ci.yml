name: windows-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo test (Rust core)
        working-directory: core_rust
        run: cargo test

      - name: Build Rust core (cdylib → voip_core.dll)
        working-directory: core_rust
        run: cargo build --release

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: app_flutter
        run: flutter pub get

      - name: Flutter build Windows (release)
        working-directory: app_flutter
        run: flutter build windows --release

      - name: Copy voip_core.dll into Flutter output
        shell: pwsh
        run: |
          $dll  = "core_rust\target\release\voip_core.dll"
          $dest = "app_flutter\build\windows\x64\runner\Release"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination $dest
            Write-Host "Copied $dll -> $dest"
          } else {
            Write-Warning "voip_core.dll not found – PJSIP integration pending."
          }

      - name: Package release artifact
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketDial-windows-x64
          path: dist/PacketDial-windows-x64.zip
          if-no-files-found: warn

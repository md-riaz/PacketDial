name: windows-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo test (Rust core)
        working-directory: core_rust
        run: cargo test

      - name: Build Rust core (cdylib → voip_core.dll)
        working-directory: core_rust
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify DLL exists
        run: dir core_rust\target\x86_64-pc-windows-msvc\release

      - name: Show Rust build directory tree
        shell: cmd
        run: |
          echo === Rust target directory structure ===
          tree /F /A core_rust\target\x86_64-pc-windows-msvc\release
        continue-on-error: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Enable Flutter Windows desktop
        working-directory: app_flutter
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        working-directory: app_flutter
        run: flutter pub get

      - name: Flutter build Windows (release)
        working-directory: app_flutter
        run: flutter build windows --release

      - name: Show Flutter build directory tree
        shell: cmd
        run: |
          echo === Flutter build directory structure ===
          tree /F /A app_flutter\build\windows
        continue-on-error: true

      - name: Debug - List build output directory structure
        shell: pwsh
        run: |
          Write-Host "=== Contents of app_flutter/build/windows/x64/runner/Release ==="
          Get-ChildItem -Recurse app_flutter/build/windows/x64/runner/Release | ForEach-Object {
            $indent = "  " * ($_.FullName.Split([IO.Path]::DirectorySeparatorChar).Count - $PWD.Path.Split([IO.Path]::DirectorySeparatorChar).Count - 5)
            if ($_.PSIsContainer) {
              Write-Host "${indent}📁 $($_.Name)/"
            } else {
              Write-Host "${indent}📄 $($_.Name) ($([math]::Round($_.Length / 1KB, 1)) KB)"
            }
          }

      - name: Copy voip_core.dll into Flutter output
        shell: pwsh
        run: |
          $dll  = "core_rust\target\x86_64-pc-windows-msvc\release\voip_core.dll"
          $dest = "app_flutter\build\windows\x64\runner\Release"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination $dest
            Write-Host "Copied $dll -> $dest"
          } else {
            Write-Warning "voip_core.dll not found – PJSIP integration pending."
          }

      - name: Show final Release directory tree before packaging
        shell: cmd
        run: |
          echo === Final Release directory structure ===
          tree /F /A app_flutter\build\windows\x64\runner\Release
        continue-on-error: true

      - name: Package release artifact
        shell: pwsh
        run: .\scripts\package.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketDial-windows-x64
          path: dist/PacketDial-windows-x64.zip
          if-no-files-found: warn

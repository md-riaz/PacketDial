name: rust-ci

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust tests & lint
    runs-on: windows-2025
    permissions:
      contents: read
    defaults:
      run:
        working-directory: core_rust

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            core_rust\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('core_rust/Cargo.lock') }}

      - name: Cache PJSIP build output
        id: cache-pjsip
        uses: actions/cache@v4
        with:
          path: engine_pjsip/build/out
          key: pjsip-${{ runner.os }}-v2144-${{ hashFiles('vcpkg_dependencies.txt', 'engine_pjsip/pjproject_config_site.h', 'scripts/build_pjsip.ps1') }}

      - name: Map workspace to short path
        shell: pwsh
        run: |
          if (-not (Test-Path X:)) {
            subst X: "$env:GITHUB_WORKSPACE"
          }
          Write-Host "Mapped workspace to X:"

      - name: Set VCPKG_ROOT environment variable
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=X:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup vcpkg (fresh clone)
        shell: pwsh
        run: |
          X:
          # Remove old vcpkg and clone fresh
          Remove-Item -Recurse -Force ".\vcpkg" -ErrorAction SilentlyContinue
          git clone --depth 1 https://github.com/microsoft/vcpkg
          Write-Host "vcpkg cloned successfully"
          # Bootstrap vcpkg
          Write-Host "Bootstrapping vcpkg..."
          cd vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          # Restore custom triplets
          Write-Host "Restoring custom triplets..."
          Copy-Item -Path "X:\vcpkg_triplets\*.cmake" -Destination "X:\vcpkg\triplets\" -Force
          # Integrate vcpkg
          Write-Host "Integrating vcpkg with MSBuild..."
          .\vcpkg.exe integrate install
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg_dependencies.txt', 'vcpkg_triplets/*.cmake') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install vcpkg dependencies (openssl, opus)
        shell: pwsh
        run: |
          X:
          cd vcpkg
          Write-Host "Installing OpenSSL and Opus for x64-windows-static-md..."
          .\vcpkg.exe install openssl:x64-windows-static-md opus:x64-windows-static-md --recurse
          Write-Host "Verifying installation..."
          if (Test-Path "X:\vcpkg\installed\x64-windows-static-md\include\openssl\ssl.h") {
            Write-Host "OpenSSL installed successfully"
          } else {
            Write-Error "OpenSSL installation verification failed"
            exit 1
          }

      - name: Build pjproject (Release x64)
        if: steps.cache-pjsip.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          X:
          .\scripts\build_pjsip.ps1

      - name: cargo test (core_rust)
        working-directory: core_rust
        env:
          PJSIP_LIB_DIR: X:\engine_pjsip\build\out\lib
          PJSIP_INCLUDE_DIR: X:\engine_pjsip\build\out\include
          RUST_BACKTRACE: 1
        run: |
          X:
          cd core_rust
          cargo test -- --nocapture

      - name: cargo fmt (core_rust)
        working-directory: core_rust
        run: cargo fmt --check

      - name: cargo clippy (core_rust)
        working-directory: core_rust
        env:
          PJSIP_LIB_DIR: X:\engine_pjsip\build\out\lib
          PJSIP_INCLUDE_DIR: X:\engine_pjsip\build\out\include
        run: |
          X:
          cd core_rust
          cargo clippy -- -D warnings

      - name: cargo test (pd)
        working-directory: tools/pd
        run: cargo test

      - name: cargo fmt (pd)
        working-directory: tools/pd
        run: cargo fmt --check || true # ignore if not setup

      - name: cargo clippy (pd)
        working-directory: tools/pd
        run: cargo clippy -- -D warnings

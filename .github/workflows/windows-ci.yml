name: windows-ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core_rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust core (cdylib)
        working-directory: core_rust
        run: cargo build --release
        continue-on-error: true  # remove once pjsip libs are present

      - name: Cargo test (Rust core)
        working-directory: core_rust
        run: cargo test

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: app_flutter
        run: flutter pub get

      - name: Flutter build Windows
        working-directory: app_flutter
        run: flutter build windows --release
        continue-on-error: true  # remove once voip_core.dll is wired in

      - name: Package release artifact
        shell: pwsh
        run: ./scripts/package.ps1
        continue-on-error: true  # remove once Flutter build succeeds

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: PacketDial-windows-x64
          path: dist/PacketDial-windows-x64.zip
          if-no-files-found: warn

# Windows CI Workflow
# Builds and tests PacketDial for Windows

name: windows-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Windows app
        uses: ./.github/actions/build-windows

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packetdial-windows-build
          path: app_flutter/build/windows/x64/runner/Release/
          retention-days: 7
